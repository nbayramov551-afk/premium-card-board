<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Multi-Board Platform</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #090d16; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; display: flex; flex-direction: column;
            justify-content: space-between;
        }
        
        #header {
            background: rgba(13, 20, 35, 0.75); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.06); pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .title-box { display: flex; align-items: center; gap: 15px; }
        .title { color: #38bdf8; font-weight: 800; font-size: 15px; text-transform: uppercase; letter-spacing: 1.5px; text-shadow: 0 0 10px rgba(56,189,248,0.4); }
        #zoom-level { background: rgba(56, 189, 248, 0.15); color: #38bdf8; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; border: 1px solid rgba(56,189,248,0.3); }
        
        #freeze-banner {
            display: none; background: #ef4444; color: white; padding: 4px 12px; border-radius: 6px;
            font-size: 11px; font-weight: bold; text-transform: uppercase; animation: pulse 1.5s infinite;
        }

        #users-container { display: flex; flex-direction: row-reverse; align-items: center; }
        .user-avatar { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #090d16; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: white; margin-left: -12px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        
        #system-alert {
            position: absolute; top: 75px; left: 50%; transform: translateX(-50%);
            background: rgba(245, 158, 11, 0.95); color: #0f172a; padding: 10px 24px;
            border-radius: 30px; font-weight: bold; font-size: 13px; z-index: 100;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); display: none; pointer-events: auto;
            animation: slideDown 0.3s ease-out;
        }

        #chat-area {
            background: linear-gradient(to top, rgba(9, 13, 22, 0.98), rgba(15, 23, 42, 0.85)); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 18px; pointer-events: auto; max-height: 28vh; display: flex; flex-direction: column;
            border-top: 1px solid rgba(255,255,255,0.06); box-shadow: 0 -10px 35px rgba(0,0,0,0.6);
            width: 100%; max-width: 500px; margin: 0 auto; border-top-left-radius: 24px; border-top-right-radius: 24px;
        }
        #messages { flex-grow: 1; overflow-y: auto; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; }
        .msg { font-size: 13.5px; color: #e2e8f0; background: rgba(255,255,255,0.04); padding: 9px 14px; border-radius: 14px; width: fit-content; max-width: 90%; }
        .msg span.sender { font-weight: 700; margin-right: 6px; }
        .msg span.time { font-size: 10px; color: #64748b; margin-left: 10px; float: right; margin-top: 3px; }
        
        #chat-form { display: flex; gap: 10px; }
        #chat-input { flex-grow: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 12px 20px; color: white; outline: none; font-size: 14px; }
        #send-btn { background: #38bdf8; border: none; border-radius: 24px; padding: 0 24px; color: #0f172a; font-weight: 700; cursor: pointer; }
        
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        @keyframes slideDown { from { top: 50px; opacity: 0; } to { top: 75px; opacity: 1; } }
        
        @media (max-width: 600px) {
            #chat-area { max-width: 100%; border-radius: 0; }
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="system-alert">Уведомление</div>
    <canvas id="board"></canvas>
    <div id="ui-layer">
        <div id="header">
            <div class="title-box">
                <div class="title">Premium Board</div>
                <div id="zoom-level">55%</div>
                <div id="freeze-banner">Заморожен</div>
            </div>
            <div id="users-container"></div>
        </div>
        <div id="chat-area">
            <div id="messages"></div>
            <form id="chat-form">
                <input type="text" id="chat-input" placeholder="Введите сообщение..." autocomplete="off">
                <button type="submit" id="send-btn">Отправить</button>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
